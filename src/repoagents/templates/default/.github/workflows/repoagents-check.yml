name: repoagents-check

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect project layout
        id: detect
        shell: bash
        run: |
          has_pyproject=false
          if [[ -f pyproject.toml ]]; then
            has_pyproject=true
          fi

          has_pytest_targets=false
          if find tests -type f -name '*.py' -print -quit 2>/dev/null | grep -q .; then
            has_pytest_targets=true
          elif find . -maxdepth 1 -type f \( -name 'test_*.py' -o -name '*_test.py' \) -print -quit | grep -q .; then
            has_pytest_targets=true
          fi

          echo "has_pyproject=$has_pyproject" >> "$GITHUB_OUTPUT"
          echo "has_pytest_targets=$has_pytest_targets" >> "$GITHUB_OUTPUT"
      - name: Validate RepoAgents scaffold
        shell: bash
        run: |
          test -f .ai-repoagents/repoagents.yaml
          test -f AGENTS.md
          test -f WORKFLOW.md
          test -f .github/workflows/repoagents-check.yml
      - uses: actions/setup-python@v5
        if: steps.detect.outputs.has_pyproject == 'true' || steps.detect.outputs.has_pytest_targets == 'true'
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
        if: steps.detect.outputs.has_pyproject == 'true'
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            **/requirements*.txt
          ignore-empty-workdir: true
      - name: Install Python dependencies
        if: steps.detect.outputs.has_pyproject == 'true'
        run: uv sync --dev
      - name: Run pytest
        if: steps.detect.outputs.has_pyproject == 'true' && steps.detect.outputs.has_pytest_targets == 'true'
        run: uv run pytest
      - name: Skip Python dependency sync
        if: steps.detect.outputs.has_pyproject != 'true'
        run: echo "No pyproject.toml detected; skipping uv sync."
      - name: Skip pytest
        if: steps.detect.outputs.has_pytest_targets != 'true'
        run: echo "No pytest-style Python tests detected; skipping pytest."
