name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -q

      - name: Build package
        run: uv build

      - name: Smoke install built wheel
        run: |
          python -m venv /tmp/reporepublic-smoke
          /tmp/reporepublic-smoke/bin/pip install dist/*.whl
          /tmp/reporepublic-smoke/bin/republic --help > /dev/null
