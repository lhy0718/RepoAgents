name: Implementation Task
description: Track a concrete RepoAgents engineering task from backlog to merged change.
title: "[Task] "
labels:
  - enhancement
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select the implementation priority for this task.
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of RepoAgents does this task primarily affect?
      options:
        - CLI
        - Config
        - Tracker
        - Workspace
        - Orchestrator
        - Roles
        - Backend/Codex
        - Policies/Safety
        - Docs
        - Tests/CI
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What is missing, broken, or too weak in the current implementation?
      placeholder: Current behavior, operational gap, and why it matters.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Define what this issue should include.
      placeholder: |
        - Add ...
        - Change ...
        - Do not include ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the observable conditions that mark this task complete.
      placeholder: |
        - [ ] ...
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Test plan
      description: What tests or validations must be added or updated?
      placeholder: Unit tests, integration tests, manual verification, dry-run checks.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and constraints
      description: Call out safety, migration, compatibility, or operational risks.
      placeholder: Human approval, backward compatibility, sensitive file rules, rate limits, etc.
  - type: input
    id: related
    attributes:
      label: Related docs or files
      description: Optional references to code, docs, or prior issues.
      placeholder: TODO.md, docs/architecture.md, src/repoagents/orchestrator/engine.py
